name: Déployer sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances (npm install)
        # npm install déclenche automatiquement le postinstall du projet
        # (scripts/fetch-engine.mjs), qui copie les fichiers Stockfish dans
        # public/engine/ AVANT le build — sans ça, le moteur serait absent
        # du site déployé.
        run: npm install

      - name: Compiler (npm run build)
        run: npm run build

      - name: Préparer les fichiers pour Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
